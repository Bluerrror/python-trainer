<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Python Trainer</title>
<meta name="theme-color" content="#f4f6fc">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Python Trainer">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="assets/icons/icon-192.png">
<style>
@font-face{font-family:'Nunito';src:url('assets/fonts/nunito.woff2') format('woff2');font-weight:400 900;font-display:swap;}
:root{
  --bg:#f4f6fc; --card:#ffffff; --ink:#1b2340; --muted:#727892; --line:#ecebf3;
  --ok:#25b06e; --okd:#17864f; --okbg:#e7f8ef; --no:#e64a6e; --nod:#c0356b; --nobg:#fdecf0;
  --sel:#3f6fb0; --gold:#f5b027;
  --grad:linear-gradient(120deg,#306698 0%,#4b8bbe 45%,#2bb5a0 75%,#ffd43b 108%);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;}
body{font-family:'Nunito',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink);
  background:radial-gradient(1100px 460px at 84% -10%, #dcebf7 0%, rgba(228,238,251,0) 60%),
             radial-gradient(900px 400px at 8% 8%, #fdf3d8 0%, rgba(253,243,216,0) 55%),
             linear-gradient(180deg,#f8fafd 0%, #eef3f8 55%, #eaf0f6 100%);
  background-attachment:fixed;min-height:100%;display:flex;justify-content:center;}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(70px);opacity:.6;z-index:0;pointer-events:none;}
body::before{width:400px;height:400px;background:radial-gradient(circle,#bcd8f2,transparent 65%);top:-90px;right:-110px;animation:drift1 16s ease-in-out infinite alternate;}
body::after{width:360px;height:360px;background:radial-gradient(circle,#ffe9a8,transparent 65%);bottom:6%;left:-120px;animation:drift2 20s ease-in-out infinite alternate;}
@keyframes drift1{to{transform:translate(-36px,42px) scale(1.1);}}
@keyframes drift2{to{transform:translate(44px,-30px) scale(1.08);}}
.app{width:100%;max-width:560px;min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.hidden{display:none !important;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 20px 118px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.scroll>*{animation:fadeUp .38s ease both;}
.scroll>*:nth-child(2){animation-delay:.05s}.scroll>*:nth-child(3){animation-delay:.09s}
.scroll>*:nth-child(4){animation-delay:.13s}
@keyframes screenfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.screenin{animation:screenfade .3s ease both;}

/* hero */
.herotop{position:relative;border-radius:26px;padding:20px 18px 24px;color:#fff;overflow:hidden;
  background:linear-gradient(130deg,#2b5f92,#4b8bbe 40%,#2bb5a0 78%,#ffd43b 118%);background-size:220% 220%;
  animation:heroshift 16s ease infinite;box-shadow:0 18px 44px rgba(43,95,146,.35),inset 0 1px 0 rgba(255,255,255,.25);}
@keyframes heroshift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.herotop::before{content:'';position:absolute;inset:0;pointer-events:none;background:
  radial-gradient(440px 210px at 88% -24%,rgba(255,255,255,.35),transparent 62%);}
.brand{display:flex;align-items:center;gap:11px;}
.brand .logo{width:46px;height:46px;border-radius:14px;background:rgba(255,255,255,.22);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;color:#fff;
  font-weight:800;font-size:19px;font-family:Georgia,serif;box-shadow:0 8px 20px rgba(0,0,0,.18);}
.brand h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.3px;}
.brand .tag{margin:2px 0 0;color:rgba(255,255,255,.85);font-size:12px;font-weight:600;}
.xppill{margin-left:auto;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);color:#ffe9a8;
  font-weight:800;font-size:14px;border-radius:20px;padding:7px 13px;backdrop-filter:blur(6px);}
[dir=rtl] .xppill{margin-left:0;margin-right:auto;}
.greet{margin:16px 2px 2px;color:#fff;font-weight:900;font-size:24px;}
.greet small{display:block;font-size:13px;font-weight:700;color:rgba(255,255,255,.8);margin-top:2px;}
.spark{position:absolute;color:rgba(255,255,255,.85);pointer-events:none;animation:twinkle 3.4s ease-in-out infinite;}
.spark.s1{top:16px;right:118px;font-size:13px;}.spark.s2{top:58px;right:26px;font-size:9px;animation-delay:1.1s;}
.spark.s3{bottom:18px;right:74px;font-size:11px;animation-delay:2.2s;}
@keyframes twinkle{0%,100%{opacity:.25;transform:scale(.7) rotate(0)}50%{opacity:1;transform:scale(1.15) rotate(40deg)}}

.sec-title{color:#7688a4;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin:24px 2px 12px;font-weight:800;
  position:relative;padding-left:15px;}
.sec-title::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:5px;height:15px;border-radius:3px;background:var(--grad);}
[dir=rtl] .sec-title{padding-left:0;padding-right:15px;}
[dir=rtl] .sec-title::before{left:auto;right:0;}
h2.page{font-size:27px;font-weight:900;letter-spacing:-.5px;margin:6px 0 0;display:inline-block;
  background:linear-gradient(120deg,#24507c,#4b8bbe 45%,#1d9e8b 85%);-webkit-background-clip:text;background-clip:text;
  color:transparent;-webkit-text-fill-color:transparent;}

/* stat chips */
.sumrow{display:flex;gap:10px;margin-top:16px;}
.sumc{flex:1;background:#fff;border:1px solid #edecf5;border-radius:16px;padding:13px 8px;text-align:center;box-shadow:0 4px 14px rgba(20,24,60,.06);}
.sumc .n{font-size:21px;font-weight:800;background:linear-gradient(120deg,#2b5f92,#4b8bbe);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;font-variant-numeric:tabular-nums;}
.sumc .l{font-size:10px;color:#9098bd;margin-top:4px;text-transform:uppercase;letter-spacing:.4px;font-weight:700;}

/* course path */
.unithead{display:flex;align-items:center;gap:13px;border-radius:20px;padding:15px 17px;color:#fff;
  box-shadow:0 8px 22px rgba(20,24,60,.16);position:relative;overflow:hidden;margin-top:20px;}
.unithead::after{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(320px 130px at 92% -34%,rgba(255,255,255,.38),transparent 62%);}
.unithead .uic{font-size:26px;}
.unithead .ut{font-weight:800;font-size:16px;}
.unithead .us{font-size:11.5px;opacity:.88;font-weight:650;margin-top:1px;}
.unithead .ulv{margin-left:auto;background:rgba(255,255,255,.22);border-radius:12px;padding:5px 10px;font-size:11.5px;font-weight:800;flex:none;}
[dir=rtl] .unithead .ulv{margin-left:0;margin-right:auto;}
.upath{display:flex;flex-direction:column;align-items:center;padding:14px 0 4px;position:relative;}
.unode{width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;
  background:#fff;border:1px solid #ecebf5;box-shadow:0 6px 0 #dfe0ec,0 8px 20px rgba(20,24,60,.08);transition:transform .08s;margin:10px 0;z-index:1;}
.unode:active{transform:translateY(3px);}
.unode.locked{filter:grayscale(1);opacity:.5;font-size:22px;}
.unode.avail{border:none;color:#fff;}
.unode.done{border:none;background:linear-gradient(135deg,#ffd465,#f5b027);box-shadow:0 6px 0 #d9982a,0 8px 20px rgba(245,176,39,.35);}
.unode .stars{position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:-1px;white-space:nowrap;}
.unode .ring{position:absolute;inset:-7px;border-radius:50%;border:3px solid;opacity:.5;animation:ringpulse 1.6s ease infinite;}
@keyframes ringpulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.08);opacity:.95}}
.nico{display:inline-block;animation:nfloat 2.6s ease-in-out infinite;}
@keyframes nfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* cards & panels */
.panel{background:var(--card);border:1px solid #ecebf5;border-radius:18px;padding:16px;box-shadow:0 6px 20px rgba(20,24,60,.06);margin-top:14px;}
.panel h4{margin:0 0 10px;font-size:14.5px;font-weight:800;display:flex;align-items:center;gap:7px;}
.panel h4 .mini{font-size:11px;font-weight:600;color:var(--muted);margin-left:auto;}
[dir=rtl] .panel h4 .mini{margin-left:0;margin-right:auto;}

/* lesson blocks */
.lesson-title{font-size:22px;font-weight:900;margin:10px 2px 2px;}
.note{background:#fff;border:1px solid #ecebf5;border-radius:16px;padding:15px 16px;margin-top:12px;
  box-shadow:0 4px 14px rgba(20,24,60,.05);font-size:14.5px;line-height:1.65;}
.note b,.note code{color:#24507c;}
.note code,.q-stem code{background:#eef3fa;border-radius:6px;padding:1px 6px;font-family:ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;font-size:.92em;direction:ltr;unicode-bidi:embed;}
.codeblock{background:#0f1b2d;border-radius:16px;margin-top:12px;overflow:hidden;box-shadow:0 8px 22px rgba(15,27,45,.35);direction:ltr;}
.codeblock .cbbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.06);}
.dot{width:10px;height:10px;border-radius:50%;flex:none;}
.codeblock .cbtitle{color:#8fa8c8;font-size:11.5px;font-weight:700;margin-left:4px;font-family:ui-monospace,Menlo,monospace;}
.codeblock .runbtn{margin-left:auto;background:linear-gradient(120deg,#2bb5a0,#25b06e);color:#fff;font-weight:800;font-size:12px;
  border-radius:10px;padding:6px 14px;box-shadow:0 3px 0 #17864f;transition:transform .06s;}
.codeblock .runbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #17864f;}
.codeblock .runbtn:disabled{opacity:.55;}
.codeblock pre{margin:0;padding:13px 15px;color:#dbe7f5;font-family:ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
  font-size:13px;line-height:1.6;overflow-x:auto;white-space:pre;}
.out{border-top:1px solid rgba(255,255,255,.08);padding:10px 15px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;
  color:#9fe8c1;white-space:pre-wrap;max-height:300px;overflow:auto;}
.out.err{color:#ff9d9d;}
.out .status{color:#8fa8c8;}
.figs img{display:block;width:100%;border-radius:12px;margin:10px 0;background:#fff;}
.figs{padding:0 15px 12px;}

/* quiz */
.qtop{display:flex;align-items:center;gap:13px;padding:16px 18px 0;}
.xbtn{font-size:22px;color:#a2a8c4;font-weight:700;line-height:1;padding:4px 6px;}
.pbar{flex:1;height:15px;background:#e4e7f1;border-radius:10px;overflow:hidden;}
.pfill{height:100%;width:0;background:var(--grad);background-size:220% 100%;animation:pflow 3s linear infinite;border-radius:10px;transition:width .35s cubic-bezier(.4,1.3,.5,1);}
@keyframes pflow{to{background-position:220% 0}}
.qcard{background:var(--card);border-radius:22px;margin:18px 18px 0;padding:20px 18px;box-shadow:0 14px 36px rgba(20,24,60,.10);
  border:1px solid rgba(255,255,255,.9);position:relative;flex:1;display:flex;flex-direction:column;overflow-y:auto;}
.qcard::before{content:'';position:absolute;top:0;left:24px;right:24px;height:4px;border-radius:0 0 4px 4px;background:var(--grad);opacity:.85;}
@keyframes qslide{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
.qcard.qin{animation:qslide .32s cubic-bezier(.25,1,.4,1) both;}
.qtag{display:inline-flex;align-self:flex-start;gap:6px;background:#eef3fa;color:#24507c;font-size:11px;font-weight:800;
  letter-spacing:.4px;padding:5px 11px;border-radius:20px;text-transform:uppercase;}
.q-stem{font-size:16.5px;line-height:1.55;font-weight:700;margin:14px 0 4px;}
.spacer{flex:1;min-height:10px;}
.opts{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
.opt{background:#fff;border:2.5px solid #e6e5f0;border-radius:14px;padding:13px 14px;font-size:14.5px;font-weight:700;color:var(--ink);
  text-align:left;box-shadow:0 3px 0 #e7e6ef;transition:transform .06s,border-color .1s,background .1s;
  font-family:ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;direction:ltr;}
[dir=rtl] .opt{text-align:right;}
.opt.sel{border-color:transparent;background:linear-gradient(#f0f5fc,#f0f5fc) padding-box,var(--grad) border-box;animation:pop .18s ease;}
@keyframes pop{0%{transform:scale(1)}55%{transform:scale(1.03)}100%{transform:scale(1)}}
.opt.correct{border-color:var(--ok);background:var(--okbg);color:var(--okd);}
.opt.wrong{border-color:var(--no);background:var(--nobg);color:var(--nod);}
.action{padding:14px 18px calc(16px + env(safe-area-inset-bottom));}
.btn-check{width:100%;background:linear-gradient(135deg,#4b8bbe,#306698);color:#fff;font-weight:800;font-size:16px;letter-spacing:.4px;
  border-radius:16px;padding:16px;box-shadow:0 5px 0 #24507c,0 14px 30px rgba(48,102,152,.35);transition:transform .06s;text-transform:uppercase;position:relative;overflow:hidden;}
.btn-check:active{transform:translateY(4px);box-shadow:0 1px 0 #24507c;}
.btn-check:disabled{background:#c7cae2;box-shadow:0 5px 0 #adb1d0;}
.btn-check:not(:disabled)::after{content:'';position:absolute;top:0;left:-70%;width:42%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);transform:skewX(-20deg);animation:btnshine 3.4s ease infinite;}
@keyframes btnshine{0%,55%{left:-70%}90%,100%{left:140%}}
.btn-primary{width:100%;background:linear-gradient(135deg,#31c17c,#22a566);color:#fff;font-weight:800;font-size:16px;
  border-radius:16px;padding:16px;box-shadow:0 5px 0 var(--okd);transition:transform .06s;text-transform:uppercase;margin-top:10px;}
.btn-primary:active{transform:translateY(4px);box-shadow:0 1px 0 var(--okd);}

/* feedback sheet */
.sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;padding:18px 20px calc(20px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 30px rgba(0,0,0,.25);transform:translateY(110%);transition:transform .28s cubic-bezier(.3,1,.4,1);z-index:60;max-width:560px;margin:0 auto;}
.sheet::before{content:'';display:block;width:44px;height:5px;border-radius:3px;background:rgba(0,0,0,.13);margin:-4px auto 12px;}
.sheet.show{transform:translateY(0);}
.sheet.ok{background:var(--okbg);}.sheet.no{background:var(--nobg);}
.sheet .head{display:flex;align-items:center;gap:11px;font-weight:800;font-size:18px;}
.sheet.ok .head{color:var(--okd);}.sheet.no .head{color:var(--nod);}
.sheet .explain{margin:10px 0 0;font-size:13.5px;color:#444;line-height:1.6;background:rgba(255,255,255,.6);border-radius:12px;padding:10px 12px;}
.sheet .btn-cont{width:100%;margin-top:15px;color:#fff;font-weight:800;font-size:16px;border-radius:15px;padding:15px;text-transform:uppercase;}
.sheet.ok .btn-cont{background:var(--ok);box-shadow:0 4px 0 var(--okd);}
.sheet.no .btn-cont{background:var(--no);box-shadow:0 4px 0 var(--nod);}

/* results */
.results{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;text-align:center;}
.results .trophy{font-size:64px;filter:drop-shadow(0 14px 30px rgba(245,176,39,.45));animation:bounceIn .6s cubic-bezier(.3,1.4,.5,1) both;}
@keyframes bounceIn{0%{opacity:0;transform:scale(.3)}55%{opacity:1;transform:scale(1.15)}75%{transform:scale(.95)}100%{transform:scale(1)}}
.rstars{font-size:38px;letter-spacing:8px;margin:0 0 10px;min-height:46px;}
.rstars span{display:inline-block;opacity:0;transform:scale(.2) rotate(-30deg);}
.rstars.reveal span{animation:starpop .5s cubic-bezier(.3,1.6,.5,1) forwards;}
.rstars.reveal span:nth-child(2){animation-delay:.25s}.rstars.reveal span:nth-child(3){animation-delay:.5s}
@keyframes starpop{to{opacity:1;transform:scale(1) rotate(0)}}
.rstars .dim{filter:grayscale(1);opacity:.3 !important;animation:none !important;}
.results h2{font-size:27px;margin:8px 0 4px;font-weight:900;}
.results p{color:#7b81a3;margin:0 0 22px;font-weight:600;}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}.rstars span{opacity:1!important;transform:none!important}}

/* playground */
.pg-editor{width:100%;min-height:220px;background:#0f1b2d;color:#dbe7f5;border:none;outline:none;border-radius:0 0 0 0;
  font-family:ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;font-size:13.5px;line-height:1.6;padding:14px 15px;resize:vertical;direction:ltr;}
.pg-wrap{background:#0f1b2d;border-radius:16px;overflow:hidden;box-shadow:0 10px 26px rgba(15,27,45,.4);margin-top:14px;direction:ltr;}
.pg-status{font-size:12px;color:#7b81a3;font-weight:700;margin-top:10px;min-height:16px;}
.chiprow{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;}
.chip{border:1.5px solid #e3e2ee;background:#fff;border-radius:20px;padding:7px 13px;font-size:12.5px;font-weight:750;color:var(--muted);}
.chip.on{border-color:transparent;background:linear-gradient(#eef3fa,#eef3fa) padding-box,var(--grad) border-box;color:#24507c;}
.chip.snip{font-size:11.5px;padding:6px 11px;background:#f6f8fd;font-family:ui-monospace,Menlo,monospace;}
.slot{display:inline-block;min-width:44px;text-align:center;background:rgba(255,212,59,.18);border-bottom:2px solid #ffd43b;border-radius:5px;padding:0 6px;color:#ffd43b;font-weight:700;}
.slot.filled{color:#fff;background:rgba(75,139,190,.35);border-bottom-color:#4b8bbe;}
.slot.ok{background:rgba(37,176,110,.4);border-bottom-color:#25b06e;color:#c9f7dd;}
.slot.bad{background:rgba(230,74,110,.4);border-bottom-color:#e64a6e;color:#ffd7df;text-decoration:line-through;}
.opt.gapopt{flex:0 0 auto;padding:10px 16px;}
.typebox{width:100%;margin-top:12px;border:2.5px solid #e6e5f0;border-radius:14px;padding:13px 14px;font-size:15px;
  font-family:ui-monospace,Menlo,monospace;outline:none;direction:ltr;}
.typebox:focus{border-color:#4b8bbe;}
.lineArea{min-height:60px;border:2px dashed #d8dcec;border-radius:14px;padding:8px;display:flex;flex-direction:column;gap:7px;margin-top:12px;}
.lineBank{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.lineTile{background:#0f1b2d;color:#dbe7f5;border-radius:11px;padding:10px 13px;font-family:ui-monospace,Menlo,monospace;
  font-size:12.5px;text-align:left;white-space:pre;direction:ltr;box-shadow:0 3px 0 #0a1420;transition:transform .06s;overflow-x:auto;}
.lineTile:active{transform:translateY(2px);}
.lineTile.used{visibility:hidden;}
.lineTile.placed{box-shadow:none;background:#17263c;}
.plotlyfig{background:#fff;border-radius:12px;margin:10px 0;overflow:hidden;}
.mplzoom{position:relative;overflow:hidden;background:#fff;border-radius:12px;margin:10px 0;touch-action:none;cursor:grab;}
.mplzoom:active{cursor:grabbing;}
.mplzoom .inner{transform-origin:0 0;will-change:transform;}
.mplzoom svg{display:block;width:100%;height:auto;}
.zoomhint{position:absolute;top:8px;right:8px;background:rgba(27,35,64,.65);color:#fff;font-size:10.5px;font-weight:700;
  border-radius:12px;padding:4px 9px;pointer-events:none;opacity:.85;transition:opacity .3s;}
.zoomreset{position:absolute;bottom:8px;right:8px;background:rgba(27,35,64,.65);color:#fff;font-size:13px;
  border-radius:10px;padding:5px 9px;display:none;}
.mplzoom.zoomed .zoomreset{display:block;}

/* examples */
.excard{background:#fff;border:1px solid #ecebf5;border-radius:16px;padding:14px 15px;margin-top:12px;box-shadow:0 4px 14px rgba(20,24,60,.05);}
.excard .xt{font-weight:800;font-size:14.5px;display:flex;align-items:center;gap:8px;}
.excard pre{margin:10px 0 0;background:#0f1b2d;color:#9fb6d5;border-radius:10px;padding:9px 12px;font-size:11.5px;line-height:1.5;
  font-family:ui-monospace,Menlo,monospace;overflow:hidden;max-height:76px;direction:ltr;}
.excard .openbtn{margin-top:10px;background:linear-gradient(120deg,#2bb5a0,#25b06e);color:#fff;font-weight:800;font-size:12.5px;
  border-radius:10px;padding:8px 16px;box-shadow:0 3px 0 #17864f;}

/* settings */
.setrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid #f2f1f8;flex-wrap:wrap;}
.setrow b{flex:1;font-size:14px;font-weight:750;}
.dangerbtn{width:100%;margin-top:14px;background:#fdecf0;color:#c0356b;font-weight:800;border-radius:13px;padding:12px;font-size:13.5px;border:1px solid #f5c9d6;}
.skrow{display:flex;align-items:center;gap:10px;margin:9px 0;}

function tt(o){if(!o)return '';return o[LANG]||o.en||'';}

/* ================= state ================= */
let DB={xp:0,answered:0,correct:0,stars:{},runs:0,lang:'en'};
const KEY='pythontrainer_v1';
try{const raw=localStorage.getItem(KEY);if(raw)DB=Object.assign(DB,JSON.parse(raw));}catch(e){}
let LANG=DB.lang||'en';

const $=id=>document.getElementById(id);
function toast(m){const el=$('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
function confetti(){const cols=['#f5b027','#25b06e','#4b8bbe','#ffd43b','#2bb5a0','#306698'];
 for(let i=0;i<80;i++){const d=document.createElement('div');d.className='confetti';d.style.left=Math.random()*100+'%';
  d.style.background=cols[Math.floor(Math.random()*cols.length)];d.style.animationDuration=(1.8+Math.random()*1.4)+'s';
  d.style.animationDelay=(Math.random()*0.3)+'s';document.body.appendChild(d);setTimeout(()=>d.remove(),3400);}}

/* ---- interactive Plotly rendering ---- */
const PLOTLY_JS='https://cdn.jsdelivr.net/npm/plotly.js-dist-min@2.35.2/plotly.min.js';
function ensurePlotly(){
  if(window.Plotly)return Promise.resolve();
  return new Promise((res,rej)=>{const sc=document.createElement('script');
    sc.src=PLOTLY_JS;sc.onload=res;sc.onerror=()=>rej(new Error('plotly.js failed to load'));
    document.head.appendChild(sc);});
}
/* every matplotlib figure becomes an interactive zoom/pan viewer */
function renderMplFigs(container,figs){
  (figs||[]).forEach(item=>{
    const kind=item[0],data=item[1];
    if(kind==='png'){
      const img=document.createElement('img');
      img.src='data:image/png;base64,'+data;
      img.style.cssText='display:block;width:100%;border-radius:12px;margin:10px 0;background:#fff';
      container.appendChild(img);return;
    }
    const box=document.createElement('div');box.className='mplzoom';
    const inner=document.createElement('div');inner.className='inner';
    inner.innerHTML=data;
    const hint=document.createElement('div');hint.className='zoomhint';hint.textContent='🔍 zoom · drag';
    const reset=document.createElement('button');reset.className='zoomreset';reset.textContent='⟲';
    box.appendChild(inner);box.appendChild(hint);box.appendChild(reset);
    container.appendChild(box);
    setTimeout(()=>{hint.style.opacity='0';},3500);
    initPanZoom(box,inner,reset);
  });
}
function initPanZoom(box,inner,resetBtn){
  let sc=1,tx=0,ty=0;
  const ptrs=new Map();let lastDist=0,lastMid=null,dragging=false,lx=0,ly=0;
  function apply(){
    sc=Math.min(12,Math.max(1,sc));
    const r=box.getBoundingClientRect();
    const maxX=0,minX=r.width*(1-sc),maxY=0,minY=r.height*(1-sc);
    tx=Math.min(maxX,Math.max(minX,tx));ty=Math.min(maxY,Math.max(minY,ty));
    if(sc===1){tx=0;ty=0;}
    inner.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
    box.classList.toggle('zoomed',sc>1.01);
  }
  function zoomAt(cx,cy,f){
    const r=box.getBoundingClientRect();
    const px=cx-r.left,py=cy-r.top;
    const ns=Math.min(12,Math.max(1,sc*f));
    tx=px-(px-tx)*(ns/sc);ty=py-(py-ty)*(ns/sc);sc=ns;apply();
  }
  box.addEventListener('wheel',e=>{e.preventDefault();zoomAt(e.clientX,e.clientY,e.deltaY<0?1.18:1/1.18);},{passive:false});
  box.addEventListener('dblclick',()=>{sc=1;apply();});
  resetBtn.addEventListener('click',e=>{e.stopPropagation();sc=1;apply();});
  box.addEventListener('pointerdown',e=>{
    box.setPointerCapture(e.pointerId);
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size===1){dragging=true;lx=e.clientX;ly=e.clientY;}
    else if(ptrs.size===2){
      const a=[...ptrs.values()];
      lastDist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
      lastMid={x:(a[0].x+a[1].x)/2,y:(a[0].y+a[1].y)/2};
      dragging=false;
    }
  });
  box.addEventListener('pointermove',e=>{
    if(!ptrs.has(e.pointerId))return;
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size===2){
      const a=[...ptrs.values()];
      const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
      const mid={x:(a[0].x+a[1].x)/2,y:(a[0].y+a[1].y)/2};
      if(lastDist>0)zoomAt(mid.x,mid.y,d/lastDist);
      lastDist=d;lastMid=mid;
    }else if(dragging&&sc>1){
      tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;apply();
    }
  });
  const up=e=>{ptrs.delete(e.pointerId);if(ptrs.size<2)lastDist=0;if(ptrs.size===0)dragging=false;};
  box.addEventListener('pointerup',up);box.addEventListener('pointercancel',up);
}
async function renderPlotlyFigs(container,figs){
  if(!figs||!figs.length)return;
  try{await ensurePlotly();}catch(e){return;}
  for(const j of figs){
    const d=document.createElement('div');d.className='plotlyfig';container.appendChild(d);
    try{const f=JSON.parse(j);Plotly.newPlot(d,f.data,f.layout||{},{responsive:true,displaylogo:false});}catch(e){}
  }
}

function show(sc){
  SCREENS.forEach(s=>$(s).classList.toggle('hidden',s!==sc));
  const nav=['home','playground','examples','profile'].includes(sc);
  $('nav').classList.toggle('hidden',!nav);
  [['navLearn','home'],['navPlay','playground'],['navEx','examples'],['navProfile','profile']]
    .forEach(([b,s])=>$(b).classList.toggle('on',sc===s));
  const el=$(sc);el.classList.remove('screenin');void el.offsetWidth;el.classList.add('screenin');
  if(sc==='home')renderHome();
  if(sc==='playground')renderPg();
  if(sc==='examples')renderExamples();
  if(sc==='profile')renderProfile();
}

/* ================= home / course ================= */
function starsOf(u){return DB.stars['u'+u]||0;}
function unlocked(u){return u===0||starsOf(u-1)>0;}
function shade(hex){const n=parseInt(hex.slice(1),16);const r=Math.max(0,(n>>16)-34),g=Math.max(0,((n>>8)&255)-34),b=Math.max(0,(n&255)-34);
 return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');}
function renderHome(){
  const hr=new Date().getHours();
  $('greet').innerHTML=(hr<12?t('gm'):hr<18?t('ga'):t('ge'))+`<small>${t('gsub')}</small>`;
  $('xpNow').textContent=DB.xp;
  $('stUnits').textContent=UNITS.filter((_,i)=>starsOf(i)>0).length+'/'+UNITS.length;
  $('stStars').textContent=Object.values(DB.stars).reduce((a,b)=>a+b,0);
  $('stRuns').textContent=DB.runs;
  let h='';
  UNITS.forEach((U,u)=>{
    const st=starsOf(u),un=unlocked(u);
    h+=`<div class="unithead" style="background:linear-gradient(135deg,${U.col},${shade(U.col)})">
      <div class="uic">${U.ic}</div><div><div class="ut">${u+1} · ${tt(U.title)}</div><div class="us">${tt(U.desc)}</div></div>
      <div class="ulv">${st?'⭐'.repeat(st):U.lv}</div></div>
    <div class="upath">`;
    let cls='unode',style='',inner='';
    if(st>0){cls+=' done';inner='✓'+`<span class="stars">${'⭐'.repeat(st)}</span>`;}
    else if(un){cls+=' avail';style=`background:linear-gradient(135deg,${U.col},${shade(U.col)});box-shadow:0 6px 0 ${shade(U.col)},0 8px 20px rgba(20,24,60,.18);`;
      inner=`<span class="nico">${U.ic}</span><span class="ring" style="border-color:${U.col}"></span>`;}
    else{cls+=' locked';inner='🔒';}
    h+=`<button class="${cls}" style="${style}" data-u="${u}">${inner}</button></div>`;
  });
  $('course').innerHTML=h;
  $('course').querySelectorAll('.unode').forEach(b=>b.onclick=()=>{
    const u=+b.dataset.u;
    if(!unlocked(u)){toast(t('lockedMsg'));return;}
    openUnit(u);
  });
}

/* ================= lesson ================= */
let CUR=0;
function codeBlockHTML(code,idx,label){
  return `<div class="codeblock" data-cb="${idx}">
    <div class="cbbar"><span class="dot" style="background:#ff5f57"></span><span class="dot" style="background:#febc2e"></span><span class="dot" style="background:#28c840"></span>
    <span class="cbtitle">${label||'example.py'}</span>
    <button class="runbtn" data-run="${idx}">▶ Run</button></div>
    <pre>${code.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</pre>
    <div class="out hidden" data-out="${idx}"></div><div class="figs" data-figs="${idx}"></div></div>`;
}
function openUnit(u){
  CUR=u;const U=UNITS[u];
  let h=`<div class="lesson-title">${U.ic} ${tt(U.title)}</div>`;
  let cb=0;
  U.blocks.forEach(b=>{
    if(b.note)h+=`<div class="note wen">${tt(b.note)}</div>`;
    if(b.code){h+=codeBlockHTML(b.code,cb,b.label);cb++;}
  });
  $('lessonBody').innerHTML=h;
  $('lessonBody').querySelectorAll('[data-run]').forEach(btn=>{
    btn.onclick=()=>runInBlock(btn,U);
  });
  show('lesson');
  $('lesson').scrollTop=0;
}
$('lessonBack').onclick=()=>show('home');
async function runInBlock(btn,U){
  const idx=btn.dataset.run;
  const wrap=btn.closest('.codeblock');
  const code=wrap.querySelector('pre').textContent;
  const out=wrap.querySelector('[data-out]');
  const figs=wrap.querySelector('[data-figs]');
  btn.disabled=true;out.classList.remove('hidden','err');figs.innerHTML='';
  out.innerHTML=`<span class="status">${navigator.onLine===false&&!pyReady()?t('needNet'):''} ${t('loadingPy')}</span>`;
  const res=await PyRun(code,msg=>{out.innerHTML=`<span class="status">${msg}</span>`;});
  btn.disabled=false;
  DB.runs++;save();
  if(res.ok){out.textContent=res.out||'✓ (no output)';}
  else{out.classList.add('err');out.textContent=res.err;}
  renderMplFigs(figs,res.figs);
  renderPlotlyFigs(figs,res.plotly);
}

/* ================= Mimo-style step player ================= */
let P={steps:[],i:0,correct:0,tasks:0,pick:null,locked:false,placed:[]};
function shuffleA(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(c){return String(c).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function buildSteps(u){
  const U=UNITS[u];
  const tasks=[...(typeof INTER!=='undefined'&&INTER[u]?INTER[u]:[]).map(x=>Object.assign({},x)),
               ...U.quiz.map(q=>Object.assign({type:'mc'},q))];
  const steps=[];let ti=0;
  U.blocks.forEach(b=>{
    steps.push({type:'learn',note:b.note,code:b.code,label:b.label});
    if(b.code&&ti<tasks.length)steps.push(tasks[ti++]);
  });
  while(ti<tasks.length)steps.push(tasks[ti++]);
  return steps;
}
function startPlayer(u){
  CUR=u;
  P={steps:buildSteps(u),i:0,correct:0,tasks:0,pick:null,locked:false,placed:[]};
  P.tasks=P.steps.filter(st=>st.type!=='learn').length;
  show('quiz');renderStep();
}
function renderStep(){
  const st=P.steps[P.i];const btn=$('checkBtn');
  $('pfill').style.width=Math.round(100*P.i/P.steps.length)+'%';
  P.pick=null;P.locked=false;P.placed=[];
  const card=$('qcard');
  let h=`<div class="qtag">${UNITS[CUR].ic} ${tt(UNITS[CUR].title)} · ${P.i+1}/${P.steps.length}</div>`;
  if(st.type==='learn'){
    if(st.note)h+=`<div class="wen" style="font-size:14.5px;line-height:1.65;margin-top:12px">${tt(st.note)}</div>`;
    if(st.code)h+=codeBlockHTML(st.code,'L',st.label);
    h+=`<div class="spacer"></div>`;
    card.innerHTML=h;
    const rb=card.querySelector('[data-run]');
    if(rb)rb.onclick=()=>runInBlock(rb,UNITS[CUR]);
    btn.textContent=t('continue');btn.disabled=false;
  }else if(st.type==='mc'){
    h+=`<div class="q-stem wen">${tt(st.q)}</div>`;
    if(st.code)h+=`<div class="codeblock"><pre>${esc(st.code)}</pre></div>`;
    h+=`<div class="spacer"></div><div class="opts" id="opts"></div>`;
    card.innerHTML=h;
    st.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';b.textContent=o;
      b.onclick=()=>{if(P.locked)return;P.pick=i;[...$('opts').children].forEach(x=>x.classList.remove('sel'));b.classList.add('sel');btn.disabled=false;};
      $('opts').appendChild(b);});
    btn.textContent=t('check');btn.disabled=true;
  }else if(st.type==='gap'){
    h+=`<div class="q-stem wen">${t('fillGap')}</div>`;
    h+=`<div class="codeblock"><pre>${esc(st.code).replace('__','<span class="slot" id="slot">▁▁</span>')}</pre></div>`;
    h+=`<div class="spacer"></div><div class="opts" id="opts" style="flex-direction:row;flex-wrap:wrap"></div>`;
    card.innerHTML=h;
    shuffleA(st.opts.slice()).forEach(o=>{const b=document.createElement('button');b.className='opt gapopt';b.textContent=o;
      b.onclick=()=>{if(P.locked)return;P.pick=o;const sl=$('slot');sl.textContent=o;sl.classList.add('filled');
        [...$('opts').children].forEach(x=>x.classList.remove('sel'));b.classList.add('sel');btn.disabled=false;};
      $('opts').appendChild(b);});
    btn.textContent=t('check');btn.disabled=true;
  }else if(st.type==='typein'){
    h+=`<div class="q-stem wen">${t('typeMissing')}</div>`;
    h+=`<div class="codeblock"><pre>${esc(st.code).replace('__','<span class="slot" id="slot">▁▁</span>')}</pre></div>`;
    h+=`<input class="typebox" id="typein" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="…"><div class="spacer"></div>`;
    card.innerHTML=h;
    const inp=$('typein');
    inp.oninput=()=>{const v=inp.value.trim();const sl=$('slot');sl.textContent=v||'▁▁';sl.classList.toggle('filled',!!v);btn.disabled=!v;};
    btn.textContent=t('check');btn.disabled=true;
  }else if(st.type==='order'){
    h+=`<div class="q-stem wen">${t('orderLines')}</div>`;
    h+=`<div class="lineArea" id="lineArea"></div><div class="lineBank" id="lineBank"></div><div class="spacer"></div>`;
    card.innerHTML=h;
    shuffleA(st.lines.map((ln,i)=>({ln,i}))).forEach(item=>{
      const b=document.createElement('button');b.className='lineTile';b.textContent=item.ln;
      b.onclick=()=>{if(P.locked||b.classList.contains('used'))return;b.classList.add('used');
        const pl=document.createElement('button');pl.className='lineTile placed';pl.textContent=item.ln;
        pl.onclick=()=>{if(P.locked)return;pl.remove();b.classList.remove('used');
          P.placed=P.placed.filter(x=>x.pl!==pl);btn.disabled=P.placed.length===0;};
        pl._src=b;$('lineArea').appendChild(pl);P.placed.push({ln:item.ln,pl});btn.disabled=false;};
      $('lineBank').appendChild(b);});
    btn.textContent=t('check');btn.disabled=true;
  }
  card.classList.remove('qin');void card.offsetWidth;card.classList.add('qin');
  card.scrollTop=0;
}
function openUnit(u){startPlayer(u);}
$('quitQuiz').onclick=()=>show('home');
$('lessonBack').onclick=()=>show('home');
$('checkBtn').onclick=()=>{
  const st=P.steps[P.i];
  if(st.type==='learn'){advance();return;}
  if(P.locked)return;
  let ok=false;
  if(st.type==='mc')ok=P.pick===st.a;
  else if(st.type==='gap')ok=P.pick===st.a;
  else if(st.type==='typein'){const v=($('typein').value||'').trim().replace(/\s+/g,' ');ok=v===String(st.a);}
  else if(st.type==='order')ok=P.placed.map(x=>x.ln).join('\n')===st.lines.join('\n');
  P.locked=true;$('checkBtn').disabled=true;
  if(st.type==='mc'){[...$('opts').children].forEach((b,i)=>{if(i===st.a)b.classList.add('correct');else if(i===P.pick)b.classList.add('wrong');b.classList.remove('sel');});}
  if(st.type==='gap'){const sl=$('slot');sl.classList.add(ok?'ok':'bad');if(!ok)setTimeout(()=>{sl.classList.remove('bad');sl.classList.add('ok');sl.textContent=st.a;},900);}
  if(st.type==='typein'){const sl=$('slot');sl.classList.add(ok?'ok':'bad');if(!ok)setTimeout(()=>{sl.classList.remove('bad');sl.classList.add('ok');sl.textContent=st.a;},900);}
  if(ok)P.correct++;
  DB.answered++;if(ok){DB.correct++;DB.xp+=10;}save();
  const sh=$('sheet');sh.className='sheet '+(ok?'ok':'no');
  $('sTitle').textContent=ok?t('correct'):t('wrong');
  let ex='';
  if(st.ex)ex=tt(st.ex);
  else if(st.type==='order')ex=`<pre style="margin:0;font-family:ui-monospace,Menlo,monospace;font-size:12px;direction:ltr;overflow-x:auto">${esc(st.lines.join('\n'))}</pre>`;
  else if(st.a!==undefined)ex=`→ <code>${esc(String(st.a))}</code>`;
  $('sExplain').innerHTML=ex;
  requestAnimationFrame(()=>requestAnimationFrame(()=>sh.classList.add('show')));
  setTimeout(()=>sh.classList.add('show'),60);
};
$('contBtn').onclick=()=>{
  $('sheet').classList.remove('show');
  advance();
};
function advance(){
  P.i++;
  if(P.i>=P.steps.length)return showResults();
  renderStep();
}
function showResults(){
  const total=Math.max(1,P.tasks),acc=Math.round(100*P.correct/total);
  const stars=acc>=90?3:acc>=70?2:acc>=50?1:0;
  const prev=starsOf(CUR);
  if(stars>prev){DB.stars['u'+CUR]=stars;save();}
  $('rTrophy').textContent=acc>=90?'🏆':acc>=70?'🎉':acc>=50?'💪':'📚';
  $('rTitle').textContent=acc>=90?t('excellent'):acc>=70?t('welldone'):t('keepgoing');
  const f=STR.quizResult[LANG]||STR.quizResult.en;
  $('rSub').textContent=f(P.correct,total);
  const rs=$('rStars');rs.classList.remove('reveal');
  rs.innerHTML=[1,2,3].map(i=>`<span class="${i<=stars?'':'dim'}">⭐</span>`).join('');
  show('results');
  requestAnimationFrame(()=>requestAnimationFrame(()=>rs.classList.add('reveal')));
  setTimeout(()=>rs.classList.add('reveal'),100);
  if(acc>=50)confetti();
}
$('rContinue').onclick=()=>show('home');$('rContinue').onclick=()=>show('home');

import numpy as np

xs = np.linspace(0, 2*np.pi, 8)
print("x  :", np.round(xs, 2))
print("sin:", np.round(np.sin(xs), 2))
`;
let pgInit=false,pgCat='Python';

  $('pgChips').innerHTML=
    '<div class="chiprow">'+cats.map(c=>
      `<button class="chip ${pgCat===c?'on':''}" data-c="${c}">${c} · ${PGLIB[c].length}</button>`).join('')+'</div>'+
    '<div class="chiprow" style="margin-top:12px">'+PGLIB[pgCat].map((sn,i)=>
      `<button class="chip snip" data-i="${i}">${sn.t}</button>`).join('')+'</div>';

}
$('pgRun').onclick=async ()=>{

};
